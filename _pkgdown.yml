url: https://jameshwade.github.io/shinymcp/

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#0f766e"
    secondary: "#475569"
    success: "#15803d"
    info: "#2563eb"
    warning: "#b45309"
    danger: "#b91c1c"
    light: "#f8fafc"
    dark: "#0f172a"
    body-color: "#172033"
    link-color: "#0f766e"
    border-color: "#d9e3ef"
    border-radius: 0.45rem
    btn-border-radius: 0.45rem

home:
  title: "shinymcp - Shiny Apps Inside AI Chat"
  description: >
    Convert Shiny apps into MCP Apps that render interactive UIs directly
    inside AI chat interfaces like Claude Desktop.
  sidebar: false

navbar:
  bg: light
  structure:
    left: [intro, reference, articles]
    right: [search, lightswitch, github]
  components:
    articles:
      text: Articles
      menu:
        - text: Use Cases
          href: articles/use-cases.html
        - text: Converting Shiny Apps
          href: articles/converting-shiny-apps.html
        - text: Automatic Conversion
          href: articles/automatic-conversion.html
        - text: Choose Migration Path
          href: articles/choose-the-right-migration-path.html
        - text: Use with shinychat
          href: articles/use-shinymcp-with-shinychat.html
        - text: Compatibility Matrix
          href: articles/compatibility-matrix.html
        - text: Debugging shinymcp
          href: articles/debugging-shinymcp.html

reference:
  - title: Create MCP Apps
    desc: Build and serve MCP Apps from UI components and tools.
    contents:
      - mcp_app
      - McpApp
      - as_mcp_app
      - as_mcp_apps
      - bindMcp
      - mcp_tool_module
      - serve
      - preview_app

  - title: Shinychat and Hosting
    desc: Embed MCP Apps in Shiny and shinychat, and return typed rich results.
    contents:
      - as_shinychat_tool
      - mcp_content_result
      - mcp_embed
      - mcp_host_server
      - mcp_host_ui
      - mcp_result_html
      - mcp_result_image
      - mcp_result_pdf
      - mcp_result_plot
      - mcp_result_table
      - mcp_result_text
      - mcp_result_widget

  - title: Input Components
    desc: >
      Interactive inputs that mirror Shiny's API. Values are sent to tools
      when the user interacts with them.
    contents:
      - mcp_select
      - mcp_text_input
      - mcp_numeric_input
      - mcp_checkbox
      - mcp_slider
      - mcp_radio
      - mcp_action_button
      - mcp_input

  - title: Output Components
    desc: >
      Placeholders populated by tool results. The JS bridge routes values
      to outputs based on matching IDs.
    contents:
      - mcp_text
      - mcp_plot
      - mcp_table
      - mcp_html
      - mcp_output

  - title: Conversion Pipeline
    desc: >
      Parse, analyze, and generate MCP Apps from existing Shiny apps.
    contents:
      - convert_app
      - parse_shiny_app
      - analyze_reactive_graph
      - generate_mcp_app
      - starts_with("print.")

  - title: Bridge Helpers
    desc: Internal helpers for the JS bridge configuration.
    contents:
      - bridge_config_tag
      - bridge_script_tag

  - title: Package
    contents:
      - shinymcp-package
