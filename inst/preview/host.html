<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{APP_NAME}} — shinymcp preview</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
:root {
  --bg: #f7f7f8;
  --surface: #ffffff;
  --border: #e0e0e4;
  --text: #1a1a1a;
  --muted: #6b6b76;
  --accent: #0066cc;
}
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
header .title {
  font-weight: 600;
}
header .badge {
  font-size: 11px;
  padding: 2px 8px;
  background: #e8f0fe;
  color: var(--accent);
  border-radius: 10px;
  font-weight: 500;
}
header .spacer { flex: 1; }
header .status {
  font-size: 12px;
  color: var(--muted);
}
header .status .dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ccc;
  margin-right: 4px;
  vertical-align: middle;
}
header .status .dot.connected { background: #22c55e; }
header .status .dot.error { background: #ef4444; }

.frame-container {
  display: flex;
  justify-content: center;
  padding: 24px 20px;
}
iframe {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  width: 100%;
  max-width: 900px;
  min-height: 200px;
  transition: height 0.15s ease;
}

.log-toggle {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  color: var(--muted);
  z-index: 10;
}
.log-toggle:hover { color: var(--text); }

.log-panel {
  display: none;
  position: fixed;
  bottom: 48px;
  right: 16px;
  width: 480px;
  max-height: 320px;
  background: #1e1e2e;
  color: #cdd6f4;
  border-radius: 8px;
  overflow: auto;
  font-family: ui-monospace, "SF Mono", monospace;
  font-size: 11px;
  line-height: 1.5;
  padding: 12px;
  z-index: 10;
  border: 1px solid #45475a;
}
.log-panel.visible { display: block; }
.log-entry { padding: 2px 0; border-bottom: 1px solid #313244; }
.log-entry .dir { font-weight: 600; }
.log-entry .dir.in { color: #89b4fa; }
.log-entry .dir.out { color: #a6e3a1; }
.log-entry .method { color: #f9e2af; }
.log-entry .detail { color: #6c7086; margin-left: 8px; }
</style>
</head>
<body>

<header>
  <span class="title">{{APP_NAME}}</span>
  <span class="badge">shinymcp preview</span>
  <span class="spacer"></span>
  <span class="status" id="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">connecting&hellip;</span>
  </span>
</header>

<div class="frame-container">
  <iframe id="appFrame" src="/app.html" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<button class="log-toggle" id="logToggle">protocol log</button>
<div class="log-panel" id="logPanel"></div>

<script>
{{HOST_JS}}
</script>
<script>
(function () {
  "use strict";

  var iframe = document.getElementById("appFrame");
  var statusDot = document.getElementById("statusDot");
  var statusText = document.getElementById("statusText");
  var logPanel = document.getElementById("logPanel");
  var logToggle = document.getElementById("logToggle");

  logToggle.addEventListener("click", function () {
    logPanel.classList.toggle("visible");
  });

  function escapeHtml(s) {
    var div = document.createElement("div");
    div.textContent = s;
    return div.innerHTML;
  }

  function log(direction, method, detail) {
    var entry = document.createElement("div");
    entry.className = "log-entry";
    var dirClass = direction === "in" ? "in" : "out";
    var arrow = direction === "in" ? "\u2190" : "\u2192";
    entry.innerHTML =
      '<span class="dir ' + dirClass + '">' + arrow + "</span> " +
      '<span class="method">' + escapeHtml(method) + "</span>" +
      (detail ? '<span class="detail">' + escapeHtml(detail) + "</span>" : "");
    logPanel.appendChild(entry);
    logPanel.scrollTop = logPanel.scrollHeight;
  }

  function setStatus(state, text) {
    statusDot.className = "dot " + state;
    statusText.textContent = text;
  }

  window.shinymcpHost.createHost({
    container: document.body,
    iframe: iframe,
    config: { instanceId: "preview", height: "auto", trigger: "debounce" },
    appSrc: "/app.html",
    initialize: function () {
      return {
        protocolVersion: "2026-01-26",
        hostInfo: {
          name: "shinymcp-preview",
          version: "0.1.0"
        },
        hostCapabilities: {},
        hostContext: {
          theme: window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light",
          displayMode: "inline"
        }
      };
    },
    setStatus: function (state, text) {
      setStatus(state, text);
    },
    callTool: function (request) {
      log("in", "tools/call", request.name);
      return fetch("/tool", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: request.name,
          arguments: request.arguments || {}
        })
      }).then(function (res) {
        return res.json();
      }).then(function (result) {
        log("out", "ui/notifications/tool-result", request.name);
        return result;
      });
    },
    readResource: function (request) {
      log("in", "resources/read", request.uri);
      return fetch("/resource", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uri: request.uri })
      }).then(function (res) {
        return res.json();
      }).then(function (result) {
        if (result && result.error) {
          throw new Error(result.error);
        }
        log("out", "resources/read", request.uri);
        return result;
      });
    },
    onNotification: function (method, params) {
      log("in", method, "notification");
      if (
        method === "ui/notifications/size-changed" &&
        params &&
        typeof params.height === "number"
      ) {
        iframe.style.height = Math.min(params.height + 2, 2000) + "px";
      }
    }
  });
})();
</script>
</body>
</html>
